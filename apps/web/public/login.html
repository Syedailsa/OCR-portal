<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OCR Portal Login</title>
  <style>
    :root { color-scheme: dark; --bg:#06111f; --bg2:#081422; --panel:rgba(10,19,33,.86); --border:rgba(148,163,184,.18); --text:#e5eef9; --muted:#8ea4be; --accent:#38bdf8; --accent2:#7c3aed; }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:radial-gradient(circle at top left,rgba(56,189,248,.18),transparent 30%),radial-gradient(circle at top right,rgba(124,58,237,.18),transparent 24%),linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .shell{min-height:100vh;display:grid;place-items:center;padding:24px} .card{width:min(520px,100%);padding:28px;border:1px solid var(--border);border-radius:28px;background:var(--panel);backdrop-filter:blur(18px);box-shadow:0 20px 70px rgba(0,0,0,.24)}
    .eyebrow{font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;color:#bfe8ff} h1{margin:10px 0 8px;font-size:clamp(2rem,4vw,3rem);line-height:1.05} .muted{color:var(--muted);line-height:1.6}
    .grid{display:grid;gap:12px;margin-top:18px} .field{min-height:50px;padding:0 16px;border:1px solid rgba(255,255,255,.1);border-radius:16px;background:rgba(4,8,15,.64);color:var(--text);outline:none}
    .field:focus{border-color:rgba(56,189,248,.5);box-shadow:0 0 0 4px rgba(56,189,248,.12)} .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    .btn{min-height:46px;padding:0 16px;border:0;border-radius:14px;color:#07111d;font-weight:700;background:linear-gradient(135deg,var(--accent),#60a5fa);cursor:pointer} .btn.secondary{background:linear-gradient(135deg,rgba(124,58,237,.92),rgba(56,189,248,.75));color:#f8fbff}
    .note{margin-top:16px;padding:12px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--muted);line-height:1.6} .status{margin-top:14px;color:#ffd99a;min-height:24px}
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <div class="eyebrow">OCR Portal</div>
      <h1>Sign in to open the dashboard</h1>
      <p class="muted">Use the seeded demo account or your own account after login is working.</p>
      <div class="grid">
        <input id="email" class="field" placeholder="Email" autocomplete="email" value="admin@gmail.com" />
        <input id="password" class="field" placeholder="Password" type="password" autocomplete="current-password" value="user123" />
      </div>
      <div class="row">
        <button id="login-btn" class="btn">Login</button>
        <button id="register-btn" class="btn secondary">Register</button>
      </div>
      <div class="note">Demo account: <strong>admin@gmail.com</strong> / <strong>user123</strong></div>
      <div id="status" class="status">Idle</div>
    </section>
  </main>
  <script>
    (() => {
      const API_URL = 'https://api.ocr-portal.27.jugaar.ai';
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const status = document.getElementById('status');

      async function auth(path) {
        if (!email.value || !password.value) { status.textContent = 'Enter email and password first'; return; }
        status.textContent = path === '/auth/register' ? 'Creating account...' : 'Signing in...';
        const response = await fetch(`${API_URL}${path}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email.value.trim(), password: password.value }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) { status.textContent = payload.detail || 'Authentication failed'; return; }
        localStorage.setItem('ocr-access-token', payload.access_token);
        window.location.replace('/portal.html');
      }

      document.getElementById('login-btn').addEventListener('click', () => auth('/auth/login'));
      document.getElementById('register-btn').addEventListener('click', () => auth('/auth/register'));
      if (localStorage.getItem('ocr-access-token')) window.location.replace('/portal.html');
    })();
  </script>
</body>
</html>
